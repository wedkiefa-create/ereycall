<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EryCall</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .main-container { width: 100%; max-width: 420px; }
        .app-title { text-align: center; color: #b71c1c; margin-bottom: 20px; font-size: 28px; font-weight: bold; }
        .card { background: white; border-radius: 15px; padding: 30px 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid #b71c1c; }
        .input-field { width: 100%; background-color: #f0f4f8; border: 1px solid #e1e5eb; padding: 15px; margin-bottom: 15px; border-radius: 10px; font-size: 16px; outline: none; text-align: inherit; }
        .btn { width: 100%; background-color: #004b93; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .lang-switch { text-align: center; margin-bottom: 20px; }
        .lang-btn { border: none; padding: 10px 20px; cursor: pointer; border-radius: 20px; margin: 0 5px; font-weight: bold; transition: 0.3s; }
        .btn-ar { background-color: #1b7a43; color: white; } 
        .btn-ti { background-color: #b71c1c; color: white; }
        .whatsapp-link { display: block; text-align: center; margin-top: 20px; color: #25d366; text-decoration: none; font-weight: bold; }
        
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="main-container">
        <h1 class="app-title">EryCall</h1>
        <div class="lang-switch">
            <button class="lang-btn btn-ar" onclick="setLanguage('ar')">العربية</button>
            <button class="lang-btn btn-ti" onclick="setLanguage('ti')">ትግርኛ</button>
        </div>

        <div class="card">
            <form id="orderForm">
                <input type="text" id="phone" class="input-field" placeholder="رقم هاتفكم" required>
                <input type="text" id="target" class="input-field" placeholder="الرقم الارتري" required>
                <input type="number" id="mins" class="input-field" placeholder="اختيار عدد الدقايق " oninput="updatePaymentUI()" required>
                
                <select id="paymentMethod" class="input-field" onchange="updatePaymentUI()" required>
                    <option value="" id="opt0">اختيار طريقة الدفع...</option>
                    <option value="vodafone" id="opt1">فودافون كاش (مصر)</option>
                    <option value="bankak" id="opt2">تطبيق بنكك (سوداني)</option>
                </select>

                <div id="instructionsBox" style="display:none; background:#e8f4fd; padding:15px; margin-bottom:15px; border-right:4px solid #004b93; color:#1a3a5f; line-height:1.6;"></div>
                
                <label id="labelReceipt" style="display:block; margin-bottom:5px; font-weight:bold;">صورة الإيصال:</label>
                <input type="file" id="receiptImage" class="input-field" accept="image/*" required>
                
                <button type="submit" class="btn" id="submitBtn">ارسال الطلب</button>
            </form>
            <a href="https://wa.me/00201142007270" target="_blank" class="whatsapp-link" id="waLink">📞 تواصل معنا في حال حدوث خطأ</a>
        </div>
    </div>
<!-- زر التثبيت الجديد (ضع هذا الكود مباشرة تحته) -->
<button id="btnInstall" style="display: none; padding: 15px; margin-top: 10px; background: #1e3a8a; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%;">
 Download EryCall
</button>
    <script>
        window.setLanguage = function(lang) {
            const dict = {
                ar: { phone: "رقم هاتفكم", target: "الرقم الارتري", mins: "اختيار عدد الدقايق ", opt0: "اختيار طريقة الدفع...", opt1: "فودافون كاش (مصر)", opt2: "تطبيق بنكك (سوداني)", btn: "ارسال الطلب", label: "صورة الإيصال:", wa: "📞 تواصل معنا في حال حدوث خطأ", success: "✅ تم استلام طلبك بنجاح!", sending: "جاري إرسال الطلب...", error: "حدث خطأ أثناء إرسال الطلب:\n" },
                ti: { phone: "ቁጽሪ ተለፎንኩም", target: "ቁጽሪ ኤርትራ", mins: "ቁጽሪ ደቃይቅ", opt0: "ሜላ ክፍሊት ምረጹ...", opt1: "ቮዳፎን ካሽ (ምስሪ)", opt2: "ኣፕሊኬሽን በንክክ (ሱዳን)", btn: "ሕቶ ልኣኽ", label: "ስእሊ መረጋገጺ ክፍሊት:", wa: "📞 ጌጋ እንተ ኣጋጢሙ ተራኸቡና", success: "✅ ሕቶኹም ብዓወት ተቐቢልናዮ!", sending: "ሕቶ ይልኣኽ ኣሎ...", error: "ሕቶ ኣብ ምልኣኽ ጌጋ ተፈጢሩ:\n" }
            };
            document.getElementById("htmlTag").dir = (lang === 'ar') ? 'rtl' : 'ltr';
            document.getElementById("phone").placeholder = dict[lang].phone;
            document.getElementById("target").placeholder = dict[lang].target;
            document.getElementById("mins").placeholder = dict[lang].mins;
            document.getElementById("opt0").innerText = dict[lang].opt0;
            document.getElementById("opt1").innerText = dict[lang].opt1;
            document.getElementById("opt2").innerText = dict[lang].opt2;
            document.getElementById("submitBtn").innerText = dict[lang].btn;
            document.getElementById("labelReceipt").innerText = dict[lang].label;
            document.getElementById("waLink").innerText = dict[lang].wa;
            updatePaymentUI();
        };

        window.updatePaymentUI = function() {
            const mins = document.getElementById("mins").value;
            const method = document.getElementById("paymentMethod").value;
            const box = document.getElementById("instructionsBox");
            const lang = document.getElementById("htmlTag").dir === 'rtl' ? 'ar' : 'ti';
            if (!mins || !method) { box.style.display = "none"; return; }
            const cost = method === "vodafone" ? mins * 5 : mins * 500;
            box.style.direction = (lang === 'ar') ? 'rtl' : 'ltr';
            box.style.textAlign = (lang === 'ar') ? 'right' : 'left';
            if (lang === 'ar') {
                box.innerHTML = method === "vodafone" ? `الرجاء التحويل لهذا الرقم لفودافون كاش: 01142007343  <br> المبلغ: ${cost} جنيه` : `التحويل لبنكك: 123456789 <br> المبلغ: ${cost} ج.س`;
            } else {
                box.innerHTML = method === "vodafone" ? `ናብዚ ቮዳፎን ካሽ ቁጽሪ ኣመሓላልፉ: 01142007343 <br> ጠቕላላ ክፍሊት: ${cost} جنيه` : `ናብዚ በንክክ ኣመሓላልፉ: 123456789 <br> ጠቕላላ ክፍሊት: ${cost} ج.س`;
            }
            box.style.display = "block";
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = {apiKey: "AIzaSyDYdzHC9JgMB5DqpinrJuD94DpW-AqTzoI",
          authDomain: "erycall.firebaseapp.com",
          projectId: "erycall",
          storageBucket: "erycall.firebasestorage.app",
          messagingSenderId: "591098828614",
          appId: "1:591098828614:web:2ef51420baf48bfc173747",
          measurementId: "G-6KB5HBQ2S9"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        document.getElementById("orderForm").onsubmit = async function (e) {
            e.preventDefault();
            const submitBtn = document.getElementById("submitBtn");
            const lang = document.getElementById("htmlTag").dir === 'rtl' ? 'ar' : 'ti';
            const dict = {
                ar: { sending: "جاري إرسال الطلب...", success: "✅ تم استلام طلبك بنجاح!", error: "حدث خطأ أثناء إرسال الطلب:\n", failRead: "حدث خطأ أثناء قراءة الصورة.", chooseFile: "يرجى اختيار صورة الإيصال" },
                ti: { sending: "ሕቶ ይልኣኽ ኣሎ...", success: "✅ ሕቶኹም ብዓወት ተቐቢልናዮ!", error: "ሕቶ ኣብ ምልኣኽ ጌጋ ተፈጢሩ:\n", failRead: "ስእሊ ኣብ ምንባብ ጌጋ ተፈጢሩ።", chooseFile: "በጃኹም ስእሊ መረጋገጺ ክፍሊት ምረጹ" }
            };

            submitBtn.disabled = true;
            submitBtn.innerText = dict[lang].sending;

            const file = document.getElementById("receiptImage").files[0];
            if (!file) {
                alert(dict[lang].chooseFile);
                submitBtn.disabled = false;
                submitBtn.innerText = (lang === 'ar') ? "ارسال الطلب" : "ሕቶ ልኣኽ";
                return;
            }

            const reader = new FileReader();
            reader.onload = async (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.5);

                    try {
                        await addDoc(collection(db, "Orders"), {
                            customerPhone: document.getElementById("phone").value,
                            targetPhone: document.getElementById("target").value,
                            minutes: document.getElementById("mins").value,
                            paymentMethod: document.getElementById("paymentMethod").value,
                            receiptImage: compressedDataUrl,
                            timestamp: new Date()
                        });
                        alert(dict[lang].success);
                        document.getElementById("orderForm").reset();
                        document.getElementById("instructionsBox").style.display = "none";
                    } catch (error) {
                        console.error(error);
                        alert(dict[lang].error + error.message);
                    }
                    submitBtn.disabled = false;
                    submitBtn.innerText = (lang === 'ar') ? "ارسال الطلب" : "ሕቶ ልኣኽ";
                };
            };
            reader.onerror = function () {
                alert(dict[lang].failRead);
                submitBtn.disabled = false;
                submitBtn.innerText = (lang === 'ar') ? "ارسال الطلب" : "ሕቶ ልኣኽ";
            };
            reader.readAsDataURL(file);
        };
    </script>
    <script>
  let deferredPrompt;
  const btnInstall = document.getElementById('btnInstall');

  window.addEventListener('beforeinstallprompt', (e) => {
    // منع المتصفح من إظهار زر التثبيت التلقائي الصغير
    e.preventDefault();
    // حفظ الحدث لاستخدامه لاحقاً
    deferredPrompt = e;
    // إظهار الزر الخاص بنا
    btnInstall.style.display = 'block';
  });

  btnInstall.addEventListener('click', (e) => {
    // إخفاء الزر بعد الضغط عليه
    btnInstall.style.display = 'none';
    // إظهار طلب التثبيت للمستخدم
    deferredPrompt.prompt();
    // انتظار اختيار المستخدم
    deferredPrompt.userChoice.then((choiceResult) => {
      if (choiceResult.outcome === 'accepted') {
        console.log('User accepted the install prompt');
      }
      deferredPrompt = null;
    });
  });
</script>
</body>
</html>
